plugins:
  jfr_dump:
    shortCut: Ctrl-J
    confirm: true
    description: "JFR"
    scopes:
      - containers
    command: zsh
    background: false
    args:
      - -c
      - |
        # create jfr
        DURATION=30
        DELAY=1s
        FILENAME="$POD.jfr"
        echo "Creating recording $FILENAME"
        kubectl exec -it --context $CONTEXT -n $NAMESPACE $POD -- jcmd 1 JFR.configure stackdepth=2048
        kubectl exec -it --context $CONTEXT -n $NAMESPACE $POD -- jcmd 1 JFR.start delay=$DELAY duration=${DURATION}s settings=profile exceptions=all filename=/tmp/$FILENAME
        sleep $DURATION
        sleep 5
        echo "Downloading recording"
        kubectl exec -it --context $CONTEXT -n $NAMESPACE $POD -- base64 -w 0 /tmp/$FILENAME | base64 --decode >$HOME/$FILENAME
        echo "Done!"
        sleep 5
  datadog_log:
    shortCut: Ctrl-L
    confirm: false
    description: "Datadog Log"
    scopes:
      - pods
    command: zsh
    background: true
    args:
      - -c
      - |
        open "https://app.datadoghq.eu/logs?query=kube_namespace%3A$NAMESPACE"
  redpanda:
    shortCut: Ctrl-O
    confirm: false
    description: "Redpanda Console"
    scopes:
      - pods
    command: zsh
    background: true
    args:
      - -c
      - |
        open "http://redpanda-console-msp.$NAMESPACE.euw1.n8s.appsflyer.engineering:9001/"
